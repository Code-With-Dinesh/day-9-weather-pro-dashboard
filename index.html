<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Weather Pro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="left">
        <h2 id="city">Loading...</h2>
        <img id="icon" />
        <h1 id="temp">--°C</h1>
        <p id="desc">---</p>

        <div class="search-box">
          <input type="text" id="search" placeholder="Enter city" />
          <button onclick="getWeather()">Search</button>
        </div>
      </div>

      <div class="right">
        <h2>Weather Info</h2>
        <p>💨 Wind: <span id="wind">--</span></p>
        <p>💧 Humidity: <span id="humidity">--</span></p>

        <h3>Forecast</h3>
        <div id="forecast"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
